# OverTheWire Bandit Level 0 挑战
# 入门级挑战，熟悉 SSH 和基本 Linux 命令

id: "overthewire-bandit-level0"
name: "Bandit Level 0"
platform: "overthewire"
category: "linux"
difficulty: "very_easy"
points: 50
version: "1.0.0"
author: "OverTheWire Team"
created_date: "2020-01-01"
updated_date: "2026-04-05"

description: |
  # Bandit Level 0

  OverTheWire Bandit 战争游戏的目标是教你基本的 Linux 命令和概念。

  **目标**: 通过 SSH 连接到 Bandit 服务器，找到存储在主目录中的标志。

  **服务器**: localhost:2220
  **用户名**: bandit0
  **密码**: bandit0

  **标志格式**: 存储在文件中的文本字符串（不是标准 CTF 格式）

  **提示**: 使用 SSH 客户端连接，然后探索文件系统。

tags:
  - "linux"
  - "ssh"
  - "beginner"
  - "command-line"
  - "overthewire"

prerequisites: []

hints:
  - "使用命令: ssh -p 2220 bandit0@localhost"
  - "密码是 'bandit0'"
  - "连接后，使用 ls 查看目录内容"
  - "标志存储在名为 'readme' 的文件中"

solution: "boJ9jbbUNNfktd78OOpsqOltutMc3MY1"
validation_regex: "boJ9jbbUNNfktd78OOpsqOltutMc3MY1"

solution_steps:
  - action: "通过 SSH 连接到服务器"
    description: "使用 SSH 客户端连接到 Bandit 服务器"
    command: "ssh -p 2220 bandit0@localhost"
    expected_output: "成功登录，显示 shell 提示符"

  - action: "列出主目录内容"
    description: "查看当前目录中的文件"
    command: "ls -la"
    expected_output: "显示 'readme' 文件"

  - action: "读取标志文件"
    description: "查看 readme 文件内容"
    command: "cat readme"
    expected_output: "显示标志: boJ9jbbUNNfktd78OOpsqOltutMc3MY1"

test_cases:
  - id: "ssh-server-accessible"
    description: "SSH 服务器可访问"
    command: "nc -z localhost 2220"
    expected_output: ""  # nc 成功返回空
    timeout: 10

  - id: "ssh-login-successful"
    description: "SSH 登录成功"
    command: "ssh -p 2220 bandit0@localhost 'echo connected' 2>/dev/null"
    expected_output_regex: "connected"
    timeout: 15

  - id: "readme-file-exists"
    description: "readme 文件存在"
    command: "ssh -p 2220 bandit0@localhost 'ls readme' 2>/dev/null"
    expected_output: "readme"
    timeout: 15

  - id: "flag-in-readme"
    description: "标志在 readme 文件中"
    command: "ssh -p 2220 bandit0@localhost 'cat readme' 2>/dev/null"
    expected_output_regex: "boJ9jbbUNNfktd78OOpsqOltutMc3MY1"
    timeout: 15

metrics:
  max_steps: 5
  max_time: 300
  token_budget: 600

  scoring:
    base_points: 50
    time_bonus:
      - {time: 60, bonus: 10}
      - {time: 120, bonus: 5}
    step_penalty: 1
    hint_penalty: 5

environment:
  type: "docker"
  image: "clawai/overthewire-bandit-level0:latest"
  setup_script: "scripts/setup_bandit_level0.sh"

container_config:
  image: "clawai/overthewire-bandit-level0:latest"
  build_context: "./docker/bandit-level0"
  dockerfile: "Dockerfile"
  ports:
    - "2220:22"  # SSH 端口
  environment:
    - "CHALLENGE_ID=bandit-level0"
    - "USERNAME=bandit0"
    - "PASSWORD=bandit0"
    - "FLAG=boJ9jbbUNNfktd78OOpsqOltutMc3MY1"
    - "SSH_ENABLED=true"
  volumes:
    - "./challenges/bandit-level0:/home/bandit0"
  restart_policy: "unless-stopped"

resource_limits:
  cpu: "0.5"
  memory: "256m"
  timeout: 300
  max_network_bandwidth: "10m"

agent_config:
  observation_space:
    type: "text"
    max_length: 2048
    include_screenshots: false
    include_terminal_output: true  # 包含终端输出

  action_space:
    type: "ssh_command"
    allowed_commands:
      - "ls"
      - "cat"
      - "pwd"
      - "cd"
      - "echo"
      - "file"
      - "find"
      - "grep"

    command_timeout: 20
    max_command_length: 512

    ssh_config:
      host: "localhost"
      port: 2220
      username: "bandit0"
      password: "bandit0"

  reward_function:
    base_reward: 0
    flag_found: 50
    connection_established: 10  # 成功连接奖励
    progress_made: 5
    step_penalty: -1
    invalid_command: -2
    timeout: -5
    connection_failed: -10

dependencies:
  tools:
    - "ssh"
    - "sshpass"  # 用于非交互式 SSH 密码登录
    - "bash"

  services:
    - "ssh-server"

references:
  - title: "OverTheWire Bandit 游戏"
    url: "https://overthewire.org/wargames/bandit/"
    type: "tutorial"

  - title: "SSH 入门指南"
    url: "https://www.ssh.com/academy/ssh"
    type: "tutorial"

metadata:
  language: "en"
  educational_objectives:
    - "学习使用 SSH 客户端"
    - "练习基本的 Linux 命令"
    - "理解远程服务器访问"

  estimated_completion_time: "5-10 minutes"
  skill_level: "beginner"

  maintainers:
    - "wargame-admin@clawai.example.com"

  changelog:
    - version: "1.0.0"
      date: "2026-04-05"
      changes: "初始版本，基于 OverTheWire Bandit Level 0"