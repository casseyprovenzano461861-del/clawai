# PicoCTF 2023 热身挑战示例配置
# 这是一个示例挑战配置文件，用于演示格式

id: "picoctf-2023-warmup-example"
name: "Warm Up Example"
platform: "picoctf"
category: "web"
difficulty: "easy"
points: 100
version: "1.0.0"
author: "ClawAI Team"
created_date: "2026-04-04"

description: |
  # 示例热身挑战

  这是一个用于演示的示例挑战，不包含实际可执行环境。

  **目标**: 理解挑战配置格式，并模拟找到标志。

  **标志格式**: picoCTF{...}

  **注意**: 这是一个配置文件示例，实际挑战需要相应的 Docker 容器和环境。

tags:
  - "web"
  - "beginner"
  - "example"
  - "configuration"

prerequisites:
  - "basic-linux-commands"
  - "web-basics"

hints:
  - "这是一个示例提示，实际挑战中会提供更有用的信息"
  - "查看页面源代码通常是 Web 挑战的第一步"
  - "标志通常隐藏在 HTML 注释、JavaScript 或响应头中"

solution: "picoCTF{sample_flag_for_demo}"
validation_regex: "picoCTF\\{.*\\}"

solution_steps:
  - action: "curl http://localhost:8000/warmup"
    description: "访问挑战页面"
    expected_output: "包含隐藏标志的 HTML 页面"

  - action: "curl -s http://localhost:8000/warmup | grep -o '<!--.*-->'"
    description: "提取 HTML 注释"
    expected_output: "<!-- 标志是: picoCTF{sample_flag_for_demo} -->"

  - action: "提取标志"
    description: "从注释中提取 picoCTF{...} 格式的标志"
    expected_output: "picoCTF{sample_flag_for_demo}"

test_cases:
  - id: "web-server-response"
    description: "Web 服务器响应测试"
    command: "curl -s -o /dev/null -w '%{http_code}' http://localhost:8000/warmup"
    expected_output: "200"
    timeout: 10

  - id: "flag-in-comments"
    description: "标志在注释中存在"
    command: "curl -s http://localhost:8000/warmup | grep -o 'picoCTF{.*}'"
    expected_output_regex: "picoCTF\\{.*\\}"
    timeout: 10

metrics:
  max_steps: 15
  max_time: 600
  token_budget: 1500

  scoring:
    base_points: 100
    time_bonus:
      - {time: 120, bonus: 20}
      - {time: 300, bonus: 10}
    step_penalty: 2
    hint_penalty: 15
    efficiency_bonus: 5  # 奖励高效解决方案

environment:
  type: "docker"
  image: "clawai/picoctf-warmup-example:latest"
  setup_script: "scripts/setup_warmup.sh"

container_config:
  image: "clawai/picoctf-warmup-example:latest"
  build_context: "./docker/warmup"
  dockerfile: "Dockerfile"
  ports:
    - "8000:80"
  environment:
    - "CHALLENGE_NAME=warmup-example"
    - "FLAG=picoCTF{sample_flag_for_demo}"
    - "DEBUG=false"
  volumes:
    - "./challenges/warmup-example:/var/www/html"
  restart_policy: "unless-stopped"

resource_limits:
  cpu: "0.5"
  memory: "256m"
  timeout: 600
  max_network_bandwidth: "10m"

agent_config:
  observation_space:
    type: "text"
    max_length: 4096
    include_screenshots: false

  action_space:
    type: "command"
    allowed_commands:
      - "ls"
      - "cat"
      - "curl"
      - "grep"
      - "head"
      - "tail"
      - "find"
      - "echo"
      - "cd"
      - "pwd"

    command_timeout: 30
    max_command_length: 1024

  reward_function:
    base_reward: 0
    flag_found: 100
    progress_made: 10  # 部分进展奖励
    step_penalty: -1
    invalid_command: -5
    timeout: -20
    security_violation: -50  # 安全违规（如尝试危险命令）

  learning_config:
    exploration_rate: 0.3
    learning_rate: 0.01
    discount_factor: 0.9
    memory_size: 1000

dependencies:
  tools:
    - "curl"
    - "grep"
    - "bash"

  services:
    - "web-server"
    - "database"

references:
  - title: "PicoCTF 入门指南"
    url: "https://picoctf.org/get-started"
    type: "tutorial"

  - title: "Web 安全测试指南"
    url: "https://owasp.org/www-project-web-security-testing-guide/"
    type: "reference"

  - title: "Docker 容器安全"
    url: "https://docs.docker.com/engine/security/"
    type: "security"

metadata:
  language: "zh-CN"
  locale: "en-US"
  accessibility: true
  educational_objectives:
    - "理解 Web 挑战的基本流程"
    - "练习基本命令行工具使用"
    - "学习 HTML 源代码分析"

  estimated_completion_time: "10-15 minutes"
  skill_level: "beginner"
  license: "CC BY-NC-SA 4.0"

  maintainers:
    - "admin@clawai.example.com"

  changelog:
    - version: "1.0.0"
      date: "2026-04-04"
      changes: "初始版本，示例配置文件"

# 验证脚本（可选）
validation_script: |
  #!/bin/bash
  # 示例验证脚本
  echo "验证挑战配置..."

  # 检查必要字段
  if [ -z "$CHALLENGE_ID" ]; then
    echo "错误: 缺少 CHALLENGE_ID"
    exit 1
  fi

  # 模拟标志验证
  if echo "$SUBMITTED_FLAG" | grep -q "picoCTF{.*}"; then
    echo "标志格式正确"
    exit 0
  else
    echo "标志格式错误"
    exit 1
  fi

# 评分脚本（可选）
scoring_script: |
  #!/bin/bash
  # 自定义评分脚本示例
  calculate_score() {
    local base_points=$1
    local time_taken=$2
    local steps_used=$3
    local hints_used=$4

    # 计算时间奖励
    local time_bonus=0
    if [ $time_taken -le 120 ]; then
      time_bonus=20
    elif [ $time_taken -le 300 ]; then
      time_bonus=10
    fi

    # 计算步骤惩罚
    local step_penalty=$((steps_used * 2))

    # 计算提示惩罚
    local hint_penalty=$((hints_used * 15))

    # 总分
    local total=$((base_points + time_bonus - step_penalty - hint_penalty))

    # 确保最低分
    if [ $total -lt 10 ]; then
      total=10
    fi

    echo $total
  }

# 说明：这是一个示例配置文件，实际挑战需要相应的实现
# 使用前请根据实际需求修改所有字段