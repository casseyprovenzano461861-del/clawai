# PicoCTF 2019 Insp3ct0r 挑战
# 真实的 PicoCTF Web 挑战，涉及 HTML/CSS/JS 文件检查

id: "picoctf-2019-insp3ct0r"
name: "Insp3ct0r"
platform: "picoctf"
category: "web"
difficulty: "easy"
points: 100
version: "1.0.0"
author: "PicoCTF Team"
created_date: "2019-10-10"
updated_date: "2026-04-05"

description: |
  # Insp3ct0r

   Kishor Balan tipped us off that the following code may need inspection:
   `https://2019shell1.picoctf.com/problem/37886/` or http://2019shell1.picoctf.com:37886

  **目标**: 检查页面及其资源文件，找到隐藏的标志。

  **标志格式**: picoCTF{...}

  **提示**: 标志被分成了三部分，分别隐藏在 HTML、CSS 和 JavaScript 文件中。

tags:
  - "web"
  - "beginner"
  - "forensics"
  - "html"
  - "css"
  - "javascript"

prerequisites:
  - "picoctf-2023-warmup"

hints:
  - "使用浏览器开发者工具检查网络请求"
  - "查看页面加载的所有文件 (HTML, CSS, JS)"
  - "标志被分成三部分，需要组合起来"
  - "检查每个文件的注释或隐藏内容"

solution: "picoCTF{tru3_d3t3ct1ve_0r_just_lucky?}"
validation_regex: "picoCTF\\{.*\\}"

solution_steps:
  - action: "访问挑战页面 http://localhost:8001/insp3ct0r"
    description: "打开挑战页面"
    expected_output: "包含多个资源文件的网页"

  - action: "查看页面源代码 (HTML)"
    description: "在 HTML 中找到第一部分标志"
    expected_output: "HTML 注释中包含: <!-- Part 1: picoCTF{tru3_d3 -->"

  - action: "检查 CSS 文件 (style.css)"
    description: "在 CSS 中找到第二部分标志"
    expected_output: "CSS 注释中包含: /* Part 2: t3ct1ve_0r */"

  - action: "检查 JavaScript 文件 (script.js)"
    description: "在 JS 中找到第三部分标志"
    expected_output: "JS 注释中包含: // Part 3: _just_lucky?}"

  - action: "组合三部分标志"
    description: "将三部分组合成完整标志"
    expected_output: "picoCTF{tru3_d3t3ct1ve_0r_just_lucky?}"

test_cases:
  - id: "web-server-accessible"
    description: "Web 服务器可访问"
    command: "curl -s -o /dev/null -w '%{http_code}' http://localhost:8001/insp3ct0r"
    expected_output: "200"
    timeout: 10

  - id: "html-file-exists"
    description: "HTML 文件存在"
    command: "curl -s http://localhost:8001/insp3ct0r | grep -o '<html'"
    expected_output_regex: "<html"
    timeout: 10

  - id: "css-file-exists"
    description: "CSS 文件存在"
    command: "curl -s http://localhost:8001/insp3ct0r | grep -o 'style\\.css'"
    expected_output_regex: "style\\.css"
    timeout: 10

  - id: "js-file-exists"
    description: "JavaScript 文件存在"
    command: "curl -s http://localhost:8001/insp3ct0r | grep -o 'script\\.js'"
    expected_output_regex: "script\\.js"
    timeout: 10

  - id: "flag-part1-in-html"
    description: "第一部分标志在 HTML 中"
    command: "curl -s http://localhost:8001/insp3ct0r | grep -o 'picoCTF\\{.*' | head -1"
    expected_output_regex: "picoCTF\\{.*"
    timeout: 10

  - id: "flag-part2-in-css"
    description: "第二部分标志在 CSS 中"
    command: "curl -s http://localhost:8001/insp3ct0r/style.css | grep -o 'picoCTF\\{.*'"
    expected_output_regex: "picoCTF\\{.*"
    timeout: 10

  - id: "flag-part3-in-js"
    description: "第三部分标志在 JS 中"
    command: "curl -s http://localhost:8001/insp3ct0r/script.js | grep -o 'picoCTF\\{.*'"
    expected_output_regex: "picoCTF\\{.*"
    timeout: 10

metrics:
  max_steps: 15
  max_time: 600
  token_budget: 1500

  scoring:
    base_points: 100
    time_bonus:
      - {time: 180, bonus: 30}
      - {time: 360, bonus: 15}
    step_penalty: 1
    hint_penalty: 15
    discovery_bonus: 20  # 发现所有三部分的奖励

environment:
  type: "docker"
  image: "clawai/picoctf-insp3ct0r:2019"
  setup_script: "scripts/setup_insp3ct0r.sh"

container_config:
  image: "clawai/picoctf-insp3ct0r:2019"
  build_context: "./docker/insp3ct0r"
  dockerfile: "Dockerfile"
  ports:
    - "8001:80"
  environment:
    - "CHALLENGE_ID=insp3ct0r-2019"
    - "FLAG_PART1=picoCTF{tru3_d3"
    - "FLAG_PART2=t3ct1ve_0r"
    - "FLAG_PART3=_just_lucky?}"
    - "DEBUG=false"
  volumes:
    - "./challenges/insp3ct0r:/var/www/html"
  restart_policy: "unless-stopped"

resource_limits:
  cpu: "0.5"
  memory: "256m"
  timeout: 600
  max_network_bandwidth: "10m"

agent_config:
  observation_space:
    type: "text"
    max_length: 4096
    include_screenshots: false
    include_network_requests: true  # 包含网络请求信息

  action_space:
    type: "command"
    allowed_commands:
      - "ls"
      - "cat"
      - "curl"
      - "grep"
      - "head"
      - "tail"
      - "find"
      - "echo"
      - "cd"
      - "pwd"
      - "wc"
      - "file"
      - "strings"

    command_timeout: 30
    max_command_length: 1024

  reward_function:
    base_reward: 0
    flag_found: 100
    partial_flag_found: 30  # 找到一部分标志
    progress_made: 10
    step_penalty: -1
    invalid_command: -3
    timeout: -10
    exploration_bonus: 5  # 探索新文件的奖励

dependencies:
  tools:
    - "curl"
    - "grep"
    - "bash"
    - "find"

  services:
    - "web-server"

references:
  - title: "PicoCTF 2019 Writeup: Insp3ct0r"
    url: "https://github.com/Dvd848/CTFs/blob/master/2019_picoCTF/Insp3ct0r.md"
    type: "writeup"

  - title: "Web 开发者工具教程"
    url: "https://developer.chrome.com/docs/devtools/"
    type: "tutorial"

metadata:
  language: "en"
  educational_objectives:
    - "学习检查网页的多个资源文件"
    - "理解标志可能被分割隐藏"
    - "练习使用命令行工具分析 Web 内容"

  estimated_completion_time: "15-25 minutes"
  skill_level: "easy"

  maintainers:
    - "ctf-admin@clawai.example.com"

  changelog:
    - version: "1.0.0"
      date: "2026-04-05"
      changes: "初始版本，基于真实 PicoCTF 挑战"