<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识图谱API测试</title>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0f172a;
            color: #f1f5f9;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            color: #3b82f6;
            margin-bottom: 10px;
        }
        
        .status {
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .status.healthy {
            border-left: 4px solid #10b981;
        }
        
        .status.error {
            border-left: 4px solid #ef4444;
        }
        
        .data-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }
        
        .card {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
        }
        
        .card h3 {
            color: #8b5cf6;
            margin-top: 0;
        }
        
        pre {
            background: #1e293b;
            padding: 15px;
            border-radius: 8px;
            overflow: auto;
            max-height: 400px;
            font-size: 14px;
        }
        
        .btn {
            padding: 10px 20px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            margin: 10px 5px;
        }
        
        .btn:hover {
            background: #2563eb;
        }
        
        .btn-refresh {
            background: #10b981;
        }
        
        .btn-refresh:hover {
            background: #059669;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        
        .stat-item {
            background: rgba(59, 130, 246, 0.1);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #3b82f6;
        }
        
        .stat-label {
            font-size: 14px;
            color: #94a3b8;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>知识图谱API集成测试</h1>
        <p>测试前后端连接状态和知识图谱数据获取</p>
        
        <div id="status" class="status">
            正在检查后端服务状态...
        </div>
        
        <div>
            <button class="btn" onclick="testHealth()">测试健康检查</button>
            <button class="btn btn-refresh" onclick="fetchGraphData()">获取图谱数据</button>
            <button class="btn" onclick="testStats()">获取统计信息</button>
        </div>
        
        <div id="stats" class="stats" style="display: none;">
            <!-- 统计信息将在这里显示 -->
        </div>
        
        <div class="data-section">
            <div class="card">
                <h3>API响应</h3>
                <pre id="api-response">等待测试...</pre>
            </div>
            
            <div class="card">
                <h3>转换后的数据</h3>
                <pre id="transformed-data">等待测试...</pre>
            </div>
        </div>
        
        <div class="card">
            <h3>测试说明</h3>
            <p>这个测试页面验证以下功能：</p>
            <ol>
                <li>后端FastAPI服务是否正常运行 (端口8000)</li>
                <li>知识图谱API端点是否可访问</li>
                <li>前端能否正确获取和解析API数据</li>
                <li>数据格式转换是否正确</li>
            </ol>
            <p><strong>后端URL:</strong> http://localhost:8000</p>
            <p><strong>知识图谱API:</strong> http://localhost:8000/api/v1/knowledge-graph/</p>
        </div>
    </div>
    
    <script>
        const API_BASE = 'http://localhost:8000/api/v1/knowledge-graph';
        
        async function testHealth() {
            const statusEl = document.getElementById('status');
            const responseEl = document.getElementById('api-response');
            
            try {
                statusEl.innerHTML = '正在测试健康检查API...';
                statusEl.className = 'status';
                
                const response = await fetch(`${API_BASE}/health`);
                const data = await response.json();
                
                responseEl.textContent = JSON.stringify(data, null, 2);
                
                if (response.ok) {
                    statusEl.innerHTML = `✅ 健康检查成功！状态: <strong>${data.status}</strong>, 服务: ${data.service}, 版本: ${data.version}`;
                    statusEl.className = 'status healthy';
                } else {
                    statusEl.innerHTML = `❌ 健康检查失败: ${response.status} ${response.statusText}`;
                    statusEl.className = 'status error';
                }
            } catch (error) {
                statusEl.innerHTML = `❌ 请求失败: ${error.message}`;
                statusEl.className = 'status error';
                responseEl.textContent = error.toString();
            }
        }
        
        async function fetchGraphData() {
            const statusEl = document.getElementById('status');
            const responseEl = document.getElementById('api-response');
            const transformedEl = document.getElementById('transformed-data');
            const statsEl = document.getElementById('stats');
            
            try {
                statusEl.innerHTML = '正在获取知识图谱数据...';
                statusEl.className = 'status';
                
                const response = await fetch(`${API_BASE}/graph`);
                const data = await response.json();
                
                responseEl.textContent = JSON.stringify(data, null, 2);
                
                if (response.ok && data.success) {
                    statusEl.innerHTML = `✅ 成功获取知识图谱数据！节点数: ${data.metadata.node_count}, 边数: ${data.metadata.edge_count}`;
                    statusEl.className = 'status healthy';
                    
                    // 转换数据格式（模拟前端转换）
                    const transformedData = {
                        nodes: data.data.nodes.map(node => ({
                            id: node.id,
                            label: node.label,
                            type: node.type,
                            x: node.position?.x || Math.random() * 800,
                            y: node.position?.y || Math.random() * 600,
                            size: node.size || 35,
                            color: node.color || '#3b82f6',
                            properties: node.properties || {}
                        })),
                        edges: data.data.edges.map(edge => ({
                            id: edge.id,
                            source: edge.source,
                            target: edge.target,
                            label: edge.label,
                            type: edge.type,
                            strength: 0.8,
                            color: edge.color || '#94a3b8'
                        }))
                    };
                    
                    transformedEl.textContent = JSON.stringify(transformedData, null, 2);
                    
                    // 显示统计信息
                    displayStats(data);
                    statsEl.style.display = 'grid';
                    
                } else {
                    statusEl.innerHTML = `❌ 获取数据失败: ${data.error || '未知错误'}`;
                    statusEl.className = 'status error';
                }
            } catch (error) {
                statusEl.innerHTML = `❌ 请求失败: ${error.message}`;
                statusEl.className = 'status error';
                responseEl.textContent = error.toString();
            }
        }
        
        async function testStats() {
            const statusEl = document.getElementById('status');
            const responseEl = document.getElementById('api-response');
            
            try {
                statusEl.innerHTML = '正在获取统计信息...';
                statusEl.className = 'status';
                
                const response = await fetch(`${API_BASE}/stats`);
                const data = await response.json();
                
                responseEl.textContent = JSON.stringify(data, null, 2);
                
                if (response.ok && data.success) {
                    statusEl.innerHTML = `✅ 成功获取统计信息！`;
                    statusEl.className = 'status healthy';
                    
                    displayStats(data);
                    document.getElementById('stats').style.display = 'grid';
                } else {
                    statusEl.innerHTML = `❌ 获取统计信息失败`;
                    statusEl.className = 'status error';
                }
            } catch (error) {
                statusEl.innerHTML = `❌ 请求失败: ${error.message}`;
                statusEl.className = 'status error';
                responseEl.textContent = error.toString();
            }
        }
        
        function displayStats(data) {
            const statsEl = document.getElementById('stats');
            
            if (data.data) {
                const stats = data.data;
                statsEl.innerHTML = `
                    <div class="stat-item">
                        <div class="stat-value">${stats.total_nodes || 0}</div>
                        <div class="stat-label">总节点数</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${stats.total_edges || 0}</div>
                        <div class="stat-label">总边数</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${Object.keys(stats.node_types || {}).length}</div>
                        <div class="stat-label">节点类型</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${Object.keys(stats.edge_types || {}).length}</div>
                        <div class="stat-label">边类型</div>
                    </div>
                `;
            }
        }
        
        // 页面加载时自动测试健康检查
        window.onload = testHealth;
    </script>
</body>
</html>
