<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClawAI - 用户管理系统测试</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }
        
        .stat-card {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.8), rgba(15, 23, 42, 0.8));
            border: 1px solid rgba(71, 85, 105, 0.3);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-2px);
            border-color: rgba(59, 130, 246, 0.5);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }
        
        .user-row {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.5), rgba(15, 23, 42, 0.5));
            border: 1px solid rgba(71, 85, 105, 0.2);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 12px;
            transition: all 0.3s;
        }
        
        .user-row:hover {
            border-color: rgba(59, 130, 246, 0.3);
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.7), rgba(15, 23, 42, 0.7));
        }
        
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .badge-admin {
            background-color: #ef4444;
            color: white;
        }
        
        .badge-analyst {
            background-color: #3b82f6;
            color: white;
        }
        
        .badge-pentester {
            background-color: #8b5cf6;
            color: white;
        }
        
        .badge-viewer {
            background-color: #10b981;
            color: white;
        }
        
        .badge-auditor {
            background-color: #f59e0b;
            color: white;
        }
        
        .badge-developer {
            background-color: #6366f1;
            color: white;
        }
        
        .status-active {
            color: #10b981;
        }
        
        .status-inactive {
            color: #ef4444;
        }
        
        .online-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }
        
        .online {
            background-color: #10b981;
            box-shadow: 0 0 8px #10b981;
        }
        
        .offline {
            background-color: #6b7280;
        }
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        
        .modal-content {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.95), rgba(15, 23, 42, 0.95));
            border: 1px solid rgba(71, 85, 105, 0.5);
            border-radius: 16px;
            padding: 24px;
            max-width: 800px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            backdrop-filter: blur(10px);
        }
        
        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        
        .button-primary {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white;
        }
        
        .button-primary:hover {
            background: linear-gradient(135deg, #2563eb, #1e40af);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }
        
        .button-outline {
            background: transparent;
            border-color: #475569;
            color: #cbd5e1;
        }
        
        .button-outline:hover {
            border-color: #3b82f6;
            color: #3b82f6;
        }
        
        .button-ghost {
            background: transparent;
            color: #cbd5e1;
        }
        
        .button-ghost:hover {
            background: rgba(71, 85, 105, 0.3);
        }
    </style>
</head>
<body>

                    <div>

                        <p class="text-gray-400 mt-1">模拟用户管理和权限控制功能</p>

                </div>
            </div>

            <!-- 用户列表 -->

                <div id="userList">

                </div>

                <!-- 分页 -->

                    <div class="text-sm opacity-70 mb-2 md:mb-0">

                    </div>
                    
                    <div class="flex items-center space-x-2">

                            <button class="button button-ghost" style="padding: 6px 12px; font-size: 14px;">2</button>
                            <button class="button button-ghost" style="padding: 6px 12px; font-size: 14px;">3</button>
                            <span class="px-2">...</span>
                            <button class="button button-ghost" style="padding: 6px 12px; font-size: 14px;">10</button>
                        </div>
                        
                        <button class="button button-ghost">

                    </div>
                </div>
            </div>

            <!-- 角色概览 -->

                    <div class="flex items-center mb-6">

                                    <div class="flex items-center space-x-3">
                                        <div class="w-32 h-2 bg-gray-700 rounded-full overflow-hidden">

                                        </div>
                                        <span class="text-sm font-medium">3 人</span>
                                    </div>
                                </div>
                                <div class="flex items-center justify-between">

                                    <div class="flex items-center space-x-3">

                                        </div>
                                        <span class="text-sm font-medium">6 人</span>
                                    </div>
                                </div>
                            </div>

                            <h3 class="font-medium mb-3">快速操作</h3>
                            <div class="grid grid-cols-2 gap-2">
                                <button class="button button-outline">
                                    <i class="fas fa-envelope mr-2"></i>
                                    发送通知
                                </button>
                                <button class="button button-outline">
                                    <i class="fas fa-download mr-2"></i>
                                    导出报告
                                </button>
                                <button class="button button-outline">
                                    <i class="fas fa-cog mr-2"></i>
                                    权限设置
                                </button>
                                <button class="button button-outline">
                                    <i class="fas fa-bell mr-2"></i>
                                    告警设置
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 底部信息栏 -->
        <div class="mt-12 py-6 border-t border-gray-800">
            <div class="container mx-auto px-6">
                <div class="flex flex-col md:flex-row items-center justify-between">
                    <div class="mb-4 md:mb-0">
                        <div class="flex items-center space-x-2">
                            <i class="fas fa-shield-alt text-blue-500"></i>
                            <span class="font-medium">ClawAI 用户管理系统</span>
                        </div>
                        <div class="text-sm text-gray-400 mt-1">
                            版本 2.0 | 基于角色的访问控制 (RBAC)
                        </div>
                    </div>
                    <div class="flex items-center space-x-4 text-sm">
                        <span class="text-gray-400">状态: <span class="text-green-500">● 用户系统正常</span></span>
                        <span class="text-gray-400">在线用户: <span class="font-medium">4/6</span></span>
                        <button class="text-blue-400 hover:text-blue-300">
                            帮助文档
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 创建用户模态框 -->
    <div id="createUserModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-xl font-semibold">创建新用户</h3>
                <button id="closeCreateModal" class="text-gray-400 hover:text-white">
                    ✕
                </button>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-2">用户名</label>
                    <input
                        type="text"
                        id="newUsername"
                        class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                        placeholder="输入用户名"
                    />
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-2">邮箱</label>
                    <input
                        type="email"
                        id="newEmail"
                        class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                        placeholder="输入邮箱地址"
                    />
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-2">角色</label>
                    <select id="newRole" class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="admin">管理员</option>
                        <option value="analyst">安全分析师</option>
                        <option value="pentester">渗透测试员</option>
                        <option value="viewer" selected>只读用户</option>
                        <option value="auditor">审计员</option>
                        <option value="developer">开发人员</option>
                    </select>
                </div>
                
                <div class="flex justify-end space-x-3 pt-4">
                    <button id="cancelCreate" class="button button-outline">
                        取消
                    </button>
                    <button id="confirmCreate" class="button button-primary">
                        创建用户
                    </button>
                </div>
            </div>
        </div>
    </div>

        document.addEventListener('DOMContentLoaded', () => {

                                    <i class="fas fa-user text-white"></i>
                                </div>
                                <div class="online-indicator ${user.isOnline ? 'online' : 'offline'} absolute -bottom-1 -right-1"></div>
                            </div>
                            <div class="ml-4">
                                <div class="font-medium">${user.fullName}</div>
                                <div class="text-sm opacity-70">@${user.username}</div>
                            </div>
                        </div>
                        
                        <div class="flex flex-col md:flex-row md:items-center space-y-2 md:space-y-0 md:space-x-6">
                            <div>
                                <div class="text-sm opacity-70">角色</div>
                                <span class="badge badge-${user.role}">${getRoleName(user.role)}</span>
                            </div>
                            
                            <div>
                                <div class="text-sm opacity-70">状态</div>
                                <div class="${user.status === 'active' ? 'status-active' : 'status-inactive'}">
                                    <i class="fas fa-circle mr-1" style="font-size: 8px;"></i>
                                    ${user.status === 'active' ? '活跃' : '禁用'}
                                </div>
                            </div>
                            
                            <div>
                                <div class="text-sm opacity-70">最后登录</div>
                                <div class="text-sm">${user.lastLogin}</div>
                            </div>
                            
                            <div class="flex items-center space-x-2">
                                <button class="button button-ghost edit-user" data-id="${user.id}">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button class="button button-ghost toggle-status" data-id="${user.id}">
                                    <i class="fas ${user.status === 'active' ? 'fa-lock' : 'fa-unlock'}"></i>
                                </button>
                                <button class="button button-ghost delete-user" data-id="${user.id}" style="color: #ef4444;">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                userList.appendChild(userRow);
            });
            
            // 添加事件监听器到新创建的按钮
            document.querySelectorAll('.edit-user').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const userId = parseInt(e.target.closest('button').dataset.id);
                    editUser(userId);
                });
            });
            
            document.querySelectorAll('.toggle-status').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const userId = parseInt(e.target.closest('button').dataset.id);
                    toggleUserStatus(userId);
                });
            });
            
            document.querySelectorAll('.delete-user').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const userId = parseInt(e.target.closest('button').dataset.id);
                    deleteUser(userId);
                });
            });
        }

        // 渲染角色概览
        function renderRoleOverview() {
            roleOverview.innerHTML = '';
            
            roleOptions.forEach(role => {
                const userCount = users.filter(u => u.role === role.id).length;
                const activeCount = users.filter(u => u.role === role.id && u.status === 'active').length;
                
                const roleCard = document.createElement('div');
                roleCard.className = 'p-4 rounded-lg bg-gray-800/50 mb-4';
                roleCard.innerHTML = `
                    <div class="flex items-center justify-between mb-2">
                        <div class="flex items-center">
                            <span class="badge badge-${role.id} mr-3">${role.name}</span>
                            <span class="text-sm opacity-70">${userCount} 个用户</span>
                        </div>
                        <div class="text-sm">
                            <span class="text-green-500">${activeCount} 活跃</span>
                            <span class="mx-2">/</span>
                            <span class="opacity-70">${userCount - activeCount} 禁用</span>
                        </div>
                    </div>
                    <p class="text-sm opacity-70">${role.description}</p>
                `;
                roleOverview.appendChild(roleCard);
            });
        }

        // 获取角色名称
        function getRoleName(roleId) {
            const role = roleOptions.find(r => r.id === roleId);
            return role ? role.name : roleId;
        }

        // 过滤用户
        function filterUsers() {
            const searchTerm = searchInput.value.toLowerCase();
            const selectedRole = roleFilter.value;
            const selectedStatus = statusFilter.value;
            
            const filtered = users.filter(user => {
                const matchesSearch = searchTerm === '' || 
                    user.username.toLowerCase().includes(searchTerm) ||
                    user.email.toLowerCase().includes(searchTerm) ||
                    user.fullName.toLowerCase().includes(searchTerm);
                
                const matchesRole = selectedRole === 'all' || user.role === selectedRole;
                const matchesStatus = selectedStatus === 'all' || user.status === selectedStatus;
                
                return matchesSearch && matchesRole && matchesStatus;
            });
            
            renderUserList(filtered);
        }

        // 编辑用户
        function editUser(userId) {
            const user = users.find(u => u.id === userId);
            if (user) {
                alert(`编辑用户: ${user.fullName}\n\n此功能在测试页面中为模拟功能。\n在真实应用中，将打开用户编辑表单。`);
            }
        }

        // 切换用户状态
        function toggleUserStatus(userId) {
            users = users.map(user => {
                if (user.id === userId) {
                    const newStatus = user.status === 'active' ? 'inactive' : 'active';
                    alert(`已将用户 ${user.fullName} 的状态从 ${user.status} 更改为 ${newStatus}`);
                    return { ...user, status: newStatus };
                }
                return user;
            });
            
            renderUserList();
            renderRoleOverview();
        }

        // 删除用户
        function deleteUser(userId) {
            const user = users.find(u => u.id === userId);
            if (user && confirm(`确定要删除用户 "${user.fullName}" 吗？此操作不可撤销。`)) {
                users = users.filter(u => u.id !== userId);
                alert(`用户 ${user.fullName} 已删除`);
                renderUserList();
                renderRoleOverview();
            }
        }

        // 创建新用户
        function createNewUser() {
            const username = document.getElementById('newUsername').value.trim();
            const email = document.getElementById('newEmail').value.trim();
            const role = document.getElementById('newRole').value;
            
            if (!username || !email) {
                alert('请填写用户名和邮箱');
                return;
            }
            
            const newUser = {
                id: users.length + 1,
                username: username,
                email: email,
                fullName: username.charAt(0).toUpperCase() + username.slice(1),
                role: role,
                status: 'active',
                isOnline: true,
                lastLogin: new Date().toLocaleString('zh-CN'),
                createdAt: new Date().toISOString().split('T')[0],
                projects: 0,
                scans: 0,
                permissions: role === 'admin' ? 
                    ['user:read', 'user:write', 'user:delete', 'scan:all', 'report:all'] :
                    role === 'analyst' ? ['user:read', 'scan:execute', 'report:generate'] :
                    role === 'pentester' ? ['scan:execute', 'report:view'] :
                    role === 'viewer' ? ['report:view'] :
                    role === 'auditor' ? ['report:view', 'audit:read'] :
                    ['scan:execute', 'report:generate', 'api:access']
            };
            
            users.push(newUser);
            createUserModal.style.display = 'none';
            
            // 清空表单
            document.getElementById('newUsername').value = '';
            document.getElementById('newEmail').value = '';
            document.getElementById('newRole').value = 'viewer';
            
            alert(`用户 ${newUser.fullName} 创建成功！`);
            renderUserList();
            renderRoleOverview();
        }
    </script>
</body>
</html>
