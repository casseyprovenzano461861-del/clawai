<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClawAI - 插件管理系统测试</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }
        
        .stat-card {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.8), rgba(15, 23, 42, 0.8));
            border: 1px solid rgba(71, 85, 105, 0.3);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-2px);
            border-color: rgba(59, 130, 246, 0.5);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }
        
        .plugin-card {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.5), rgba(15, 23, 42, 0.5));
            border: 1px solid rgba(71, 85, 105, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            transition: all 0.3s;
        }
        
        .plugin-card:hover {
            border-color: rgba(59, 130, 246, 0.3);
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.7), rgba(15, 23, 42, 0.7));
            transform: translateY(-2px);
        }
        
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .badge-blue {
            background-color: #3b82f6;
            color: white;
        }
        
        .badge-green {
            background-color: #10b981;
            color: white;
        }
        
        .badge-red {
            background-color: #ef4444;
            color: white;
        }
        
        .badge-purple {
            background-color: #8b5cf6;
            color: white;
        }
        
        .badge-orange {
            background-color: #f59e0b;
            color: white;
        }
        
        .badge-indigo {
            background-color: #6366f1;
            color: white;
        }
        
        .badge-yellow {
            background-color: #fbbf24;
            color: #1f2937;
        }
        
        .badge-pink {
            background-color: #ec4899;
            color: white;
        }
        
        .badge-outline {
            background-color: transparent;
            border: 1px solid #475569;
            color: #cbd5e1;
        }
        
        .status-active {
            color: #10b981;
        }
        
        .status-inactive {
            color: #f59e0b;
        }
        
        .status-available {
            color: #3b82f6;
        }
        
        .status-updating {
            color: #f59e0b;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        
        .modal-content {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.95), rgba(15, 23, 42, 0.95));
            border: 1px solid rgba(71, 85, 105, 0.5);
            border-radius: 16px;
            padding: 24px;
            max-width: 800px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            backdrop-filter: blur(10px);
        }
        
        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        
        .button-primary {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white;
        }
        
        .button-primary:hover {
            background: linear-gradient(135deg, #2563eb, #1e40af);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }
        
        .button-outline {
            background: transparent;
            border-color: #475569;
            color: #cbd5e1;
        }
        
        .button-outline:hover {
            border-color: #3b82f6;
            color: #3b82f6;
        }
        
        .button-ghost {
            background: transparent;
            color: #cbd5e1;
        }
        
        .button-ghost:hover {
            background: rgba(71, 85, 105, 0.3);
        }
        
        .tab-button {
            padding: 12px 24px;
            font-weight: 500;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }
        
        .tab-button.active {
            border-bottom-color: #3b82f6;
            color: #3b82f6;
        }
        
        .tab-button:hover:not(.active) {
            color: #cbd5e1;
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background-color: #1e293b;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #10b981);
            border-radius: 4px;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="min-h-screen">
        <!-- 插件管理头部 -->
        <div class="bg-gray-800/80 backdrop-blur-sm border-b border-gray-700 sticky top-0 z-50">
            <div class="container mx-auto px-6 py-4">
                <div class="flex flex-col md:flex-row items-start md:items-center justify-between">
                    <div>
                        <h1 class="text-2xl font-bold">插件管理系统测试</h1>
                        <p class="text-gray-400 mt-1">扩展ClawAI功能，安装和管理插件</p>
                    </div>
                    
                    <div class="flex items-center space-x-3 mt-4 md:mt-0">
                        <button class="button button-outline">
                            <i class="fas fa-upload mr-2"></i>
                            上传插件
                        </button>
                        
                        <button id="installPluginBtn" class="button button-primary">
                            <i class="fas fa-cloud-download-alt mr-2"></i>
                            从商店安装
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="container mx-auto px-6 py-8">
            <!-- 统计卡片 -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-6 mb-8">
                <div class="stat-card">
                    <div class="flex items-center justify-between mb-3">
                        <div class="p-2 rounded-lg bg-blue-500/10 text-blue-500">
                            <i class="fas fa-box"></i>
                        </div>
                        <span class="badge" style="background-color: #10b981; color: white;">+3</span>
                    </div>
                    <div class="text-2xl font-bold mb-1">4</div>
                    <div class="text-sm opacity-70">已安装插件</div>
                </div>
                
                <div class="stat-card">
                    <div class="flex items-center justify-between mb-3">
                        <div class="p-2 rounded-lg bg-green-500/10 text-green-500">
                            <i class="fas fa-plug"></i>
                        </div>
                        <span class="badge" style="background-color: #10b981; color: white;">+2</span>
                    </div>
                    <div class="text-2xl font-bold mb-1">3</div>
                    <div class="text-sm opacity-70">激活插件</div>
                </div>
                
                <div class="stat-card">
                    <div class="flex items-center justify-between mb-3">
                        <div class="p-2 rounded-lg bg-purple-500/10 text-purple-500">
                            <i class="fas fa-download"></i>
                        </div>
                        <span class="badge" style="background-color: #10b981; color: white;">+5</span>
                    </div>
                    <div class="text-2xl font-bold mb-1">4</div>
                    <div class="text-sm opacity-70">可安装插件</div>
                </div>
                
                <div class="stat-card">
                    <div class="flex items-center justify-between mb-3">
                        <div class="p-2 rounded-lg bg-orange-500/10 text-orange-500">
                            <i class="fas fa-sync-alt"></i>
                        </div>
                        <span class="badge" style="background-color: #ef4444; color: white;">0</span>
                    </div>
                    <div class="text-2xl font-bold mb-1">0</div>
                    <div class="text-sm opacity-70">待更新</div>
                </div>
                
                <div class="stat-card">
                    <div class="flex items-center justify-between mb-3">
                        <div class="p-2 rounded-lg bg-indigo-500/10 text-indigo-500">
                            <i class="fas fa-database"></i>
                        </div>
                        <span class="badge" style="background-color: #10b981; color: white;">+4.2</span>
                    </div>
                    <div class="text-2xl font-bold mb-1">22.3 MB</div>
                    <div class="text-sm opacity-70">总大小</div>
                </div>
            </div>

            <!-- 标签页导航 -->
            <div class="flex border-b border-gray-700 mb-6 overflow-x-auto">
                <button id="tabInstalled" class="tab-button active" data-tab="installed">
                    已安装 <span class="ml-2 px-2 py-1 text-xs rounded-full bg-gray-700">4</span>
                </button>
                <button id="tabAvailable" class="tab-button" data-tab="available">
                    可安装 <span class="ml-2 px-2 py-1 text-xs rounded-full bg-gray-700">4</span>
                </button>
                <button id="tabUpdates" class="tab-button" data-tab="updates">
                    更新 <span class="ml-2 px-2 py-1 text-xs rounded-full bg-gray-700">0</span>
                </button>
                <button id="tabSettings" class="tab-button" data-tab="settings">
                    设置
                </button>
            </div>

            <!-- 控制面板 -->
            <div class="stat-card mb-8">
                <div class="flex flex-col md:flex-row items-center justify-between">
                    <div class="flex flex-col md:flex-row items-center space-y-4 md:space-y-0 md:space-x-4 mb-4 md:mb-0">
                        <!-- 搜索框 -->
                        <div class="relative">
                            <i class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 opacity-50"></i>
                            <input
                                type="text"
                                id="searchInput"
                                placeholder="搜索插件..."
                                class="pl-10 pr-4 py-2 bg-gray-800 border border-gray-700 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 w-64"
                            />
                        </div>

                        <!-- 类别过滤 -->
                        <select id="categoryFilter" class="px-4 py-2 bg-gray-800 border border-gray-700 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="all">所有类别</option>
                            <option value="scanner">扫描器</option>
                            <option value="database">数据库</option>
                            <option value="export">导出工具</option>
                            <option value="crawler">爬虫</option>
                            <option value="ai">人工智能</option>
                            <option value="api">API工具</option>
                            <option value="compliance">合规性</option>
                            <option value="ui">界面组件</option>
                        </select>

                        <!-- 状态过滤 -->
                        <select id="statusFilter" class="px-4 py-2 bg-gray-800 border border-gray-700 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="all">所有状态</option>
                            <option value="active">已激活</option>
                            <option value="inactive">已禁用</option>
                            <option value="available">可安装</option>
                            <option value="updating">更新中</option>
                        </select>
                    </div>

                    <div class="flex items-center space-x-2">
                        <button id="resetFilters" class="button button-ghost">
                            <i class="fas fa-sync-alt mr-2"></i>
                            重置过滤
                        </button>
                        
                        <button class="button button-ghost">
                            <i class="fas fa-filter mr-2"></i>
                            高级过滤
                        </button>
                    </div>
                </div>
            </div>

            <!-- 插件列表 -->
            <div id="pluginList">
                <!-- 插件卡片将通过JavaScript动态生成 -->
            </div>

            <!-- 类别分布和系统信息 -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mt-8">
                <!-- 类别分布 -->
                <div class="stat-card">
                    <div class="flex items-center mb-6">
                        <div class="p-2 rounded-lg bg-blue-500/10 text-blue-500 mr-2">
                            <i class="fas fa-chart-bar"></i>
                        </div>
                        <h2 class="text-xl font-semibold">插件类别分布</h2>
                    </div>

                    <div id="categoryDistribution">
                        <!-- 类别分布将通过JavaScript动态生成 -->
                    </div>
                </div>

                <!-- 系统信息 -->
                <div class="stat-card">
                    <div class="flex items-center mb-6">
                        <div class="p-2 rounded-lg bg-green-500/10 text-green-500 mr-2">
                            <i class="fas fa-cog"></i>
                        </div>
                        <h2 class="text-xl font-semibold">系统信息</h2>
                    </div>

                    <div class="space-y-6">
                        <!-- 插件存储使用 -->
                        <div>
                            <h3 class="font-medium mb-3">插件存储使用</h3>
                            <div class="space-y-2">
                                <div class="flex items-center justify-between">
                                    <span class="text-sm">已安装插件</span>
                                    <div class="flex items-center space-x-3">
                                        <div class="w-32 h-2 bg-gray-700 rounded-full overflow-hidden">
                                            <div class="progress-fill" style="width: 50%"></div>
                                        </div>
                                        <span class="text-sm font-medium">4/8</span>
                                    </div>
                                </div>
                                <div class="flex items-center justify-between">
                                    <span class="text-sm">存储空间</span>
                                    <div class="flex items-center space-x-3">
                                        <div class="w-32 h-2 bg-gray-700 rounded-full overflow-hidden">
                                            <div class="progress-fill" style="width: 45%"></div>
                                        </div>
                                        <span class="text-sm font-medium">22.3 MB / 50 MB</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- 快速操作 -->
                        <div>
                            <h3 class="font-medium mb-3">快速操作</h3>
                            <div class="grid grid-cols-2 gap-2">
                                <button class="button button-outline">
                                    <i class="fas fa-download mr-2"></i>
                                    批量安装
                                </button>
                                <button class="button button-outline">
                                    <i class="fas fa-upload mr-2"></i>
                                    批量导出
                                </button>
                                <button class="button button-outline">
                                    <i class="fas fa-sync-alt mr-2"></i>
                                    检查更新
                                </button>
                                <button class="button button-outline">
                                    <i class="fas fa-cog mr-2"></i>
                                    插件设置
                                </button>
                            </div>
                        </div>

                        <!-- 系统状态 -->
                        <div>
                            <h3 class="font-medium mb-3">系统状态</h3>
                            <div class="grid grid-cols-2 gap-3">
                                <div class="p-3 rounded-lg bg-gray-800/50">
                                    <div class="text-sm opacity-70 mb-1">插件API</div>
                                    <div class="flex items-center">
                                        <div class="w-3 h-3 rounded-full bg-green-500 mr-2"></div>
                                        <span class="font-medium">运行正常</span>
                                    </div>
                                </div>
                                <div class="p-3 rounded-lg bg-gray-800/50">
                                    <div class="text-sm opacity-70 mb-1">沙箱环境</div>
                                    <div class="flex items-center">
                                        <div class="w-3 h-3 rounded-full bg-green-500 mr-2"></div>
                                        <span class="font-medium">已启用</span>
                                    </div>
                                </div>
                                <div class="p-3 rounded-lg bg-gray-800/50">
                                    <div class="text-sm opacity-70 mb-1">安全扫描</div>
                                    <div class="flex items-center">
                                        <div class="w-3 h-3 rounded-full bg-green-500 mr-2"></div>
                                        <span class="font-medium">已通过</span>
                                    </div>
                                </div>
                                <div class="p-3 rounded-lg bg-gray-800/50">
                                    <div class="text-sm opacity-70 mb-1">依赖检查</div>
                                    <div class="flex items-center">
                                        <div class="w-3 h-3 rounded-full bg-green-500 mr-2"></div>
                                        <span class="font-medium">无冲突</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 底部信息栏 -->
    <div class="mt-12 py-6 border-t border-gray-800">
        <div class="container mx-auto px-6">
            <div class="flex flex-col md:flex-row items-center justify-between">
                <div class="mb-4 md:mb-0">
                    <div class="flex items-center space-x-2">
                        <i class="fas fa-puzzle-piece text-blue-500"></i>
                        <span class="font-medium">ClawAI 插件管理系统</span>
                    </div>
                    <div class="text-sm text-gray-400 mt-1">
                        版本 2.0 | 支持插件扩展架构
                    </div>
                </div>
                <div class="flex items-center space-x-4 text-sm">
                    <span class="text-gray-400">状态: <span class="text-green-500">● 插件系统正常</span></span>
                    <span class="text-gray-400">激活插件: <span class="font-medium">3/4</span></span>
                    <button class="text-blue-400 hover:text-blue-300">
                        插件开发文档
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="test-plugin.js"></script>
    <script src="test-plugin-complete.js"></script>
</body>
</html>
