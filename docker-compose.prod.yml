# ClawAI Production Docker Compose
# Hardened for production: resource limits, read-only FS, security options

services:
  # ==================== Backend API ====================
  clawai-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clawai-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - DEBUG=false
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - SERVER_HOST=0.0.0.0
      - BACKEND_PORT=8000
      - API_AUTH_ENABLED=true
      - API_SECRET_KEY=${API_SECRET_KEY:-}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?JWT_SECRET_KEY must be set}
      - JWT_ALGORITHM=HS256
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - DEFAULT_ADMIN_USERNAME=${DEFAULT_ADMIN_USERNAME:-admin}
      - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD:-}
      - DATABASE_TYPE=${DATABASE_TYPE:-sqlite}
      - DATABASE_URL=${DATABASE_URL:-sqlite:////app/data/databases/clawai.db}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FILE=/app/logs/clawai.log
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:?ALLOWED_ORIGINS must be set (e.g. https://your-domain.com)}
      - ENABLE_REAL_ATTACK=${ENABLE_REAL_ATTACK:-false}
      - ENABLE_CVE_DETECTION=${ENABLE_CVE_DETECTION:-true}
      - ENABLE_AI_ANALYSIS=${ENABLE_AI_ANALYSIS:-true}
      - ENVIRONMENT=production
    volumes:
      - clawai_data:/app/data
      - clawai_logs:/app/logs
      - clawai_results:/app/results
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW
      - NET_ADMIN
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 30s
    networks:
      - clawai-network
    depends_on:
      redis:
        condition: service_healthy

  # ==================== Frontend ====================
  clawai-frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: clawai-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://clawai-backend:8000}
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=16m
      - /var/cache/nginx:noexec,nosuid,size=32m
      - /var/run:noexec,nosuid,size=1m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    restart: unless-stopped
    networks:
      - clawai-network
    depends_on:
      clawai-backend:
        condition: service_healthy

  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    container_name: clawai-redis
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    volumes:
      - redis_data:/data
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=16m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 64M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - clawai-network

  # ==================== Qdrant Vector DB ====================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: clawai-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__LOG_LEVEL=INFO
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - clawai-network

  # ==================== Prometheus (optional) ====================
  prometheus:
    image: prom/prometheus:latest
    container_name: clawai-prometheus
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    profiles:
      - monitoring
    restart: unless-stopped
    networks:
      - clawai-network

  # ==================== Grafana (optional) ====================
  grafana:
    image: grafana/grafana:latest
    container_name: clawai-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    profiles:
      - monitoring
    restart: unless-stopped
    depends_on:
      - prometheus
    networks:
      - clawai-network

# ==================== Volumes ====================
volumes:
  clawai_data:
    driver: local
  clawai_logs:
    driver: local
  clawai_results:
    driver: local
  redis_data:
    driver: local
  qdrant_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# ==================== Network ====================
networks:
  clawai-network:
    driver: bridge
    internal: false
