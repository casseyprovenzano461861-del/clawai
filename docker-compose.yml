# ClawAI Docker Compose 配置
# 用于部署 Qdrant 向量数据库和其他服务

version: "3.8"

services:
  # ==================== Qdrant 向量数据库 ====================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: clawai-qdrant
    restart: unless-stopped
    ports:
      - "16333:6333"   # REST API (外部端口16333)
      - "16334:6334"   # gRPC API (外部端口16334)
    volumes:
      - qdrant_data:/qdrant/storage
      - ./config/qdrant:/qdrant/config
    environment:
      - QDRANT__LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - clawai-network

  # ==================== Redis 缓存 ====================
  redis:
    image: redis:7-alpine
    container_name: clawai-redis
    restart: unless-stopped
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - clawai-network

  # ==================== Prometheus 监控（可选） ====================
  prometheus:
    image: prom/prometheus:latest
    container_name: clawai-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    profiles:
      - monitoring
    networks:
      - clawai-network

  # ==================== Grafana 可视化（可选） ====================
  grafana:
    image: grafana/grafana:latest
    container_name: clawai-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-change-me-in-production}
      - GF_USERS_ALLOW_SIGN_UP=false
    profiles:
      - monitoring
    depends_on:
      - prometheus
    networks:
      - clawai-network

# ==================== 数据卷 ====================
volumes:
  qdrant_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# ==================== 网络 ====================
networks:
  clawai-network:
    driver: bridge
