# ClawAI Docker Compose 配置
# 用于快速部署和运行ClawAI项目

services:
  # ClawAI 后端API服务
  clawai-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clawai-backend
    ports:
      - "8000:8000"
    environment:
      # 基础配置
      - DEBUG=false
      - SECRET_KEY=${SECRET_KEY:-}
      
      # API配置
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_BASE_URL=https://api.deepseek.com
      - DEEPSEEK_MODEL=deepseek-chat
      
      # 服务器配置
      - SERVER_HOST=0.0.0.0
      - BACKEND_PORT=8000
      
      # 安全配置
      - API_AUTH_ENABLED=true
      - API_SECRET_KEY=${API_SECRET_KEY:-}
      - JWT_SECRET=${JWT_SECRET:-}
      - JWT_ALGORITHM=HS256
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=30
      - DEFAULT_ADMIN_USERNAME=${DEFAULT_ADMIN_USERNAME:-admin}
      - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD:-}
      
      # 数据库配置
      - DATABASE_TYPE=sqlite
      - DATABASE_URL=sqlite:////app/clawai.db
      
      # 日志配置
      - LOG_LEVEL=INFO
      - LOG_FILE=/app/logs/clawai.log
      
      # 功能开关
      - ENABLE_REAL_ATTACK=true
      - ENABLE_CVE_DETECTION=true
      - ENABLE_AI_ANALYSIS=true
      - ENABLE_ATTACK_VISUALIZATION=true
      - ENABLE_ATTACK_EVOLUTION=true
      - ENABLE_DEFENSE_SIMULATION=true
      - ENABLE_REPORT_GENERATION=true
      
      # 开发配置
      - DEVELOPMENT_MODE=production
      - USE_MOCK_DATA=false
    volumes:
      # 挂载数据卷，持久化数据库和日志
      - clawai_data:/app/clawai.db
      - clawai_logs:/app/logs
      - clawai_results:/app/results
      # 挂载工具目录（如果需要使用主机上的工具）
      # - /usr/bin/nmap:/usr/bin/nmap:ro
      # - /usr/bin/whatweb:/usr/bin/whatweb:ro
      # - /usr/local/bin/nuclei:/usr/local/bin/nuclei:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - clawai-network

  # ClawAI 前端应用服务
  clawai-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: clawai-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://clawai-backend:8000
    depends_on:
      - clawai-backend
    restart: unless-stopped
    networks:
      - clawai-network

  # 可选：Redis缓存服务（如果需要）
  # redis:
  #   image: redis:7-alpine
  #   container_name: clawai-redis
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data:/data
  #   restart: unless-stopped
  #   networks:
  #     - clawai-network

# 数据卷定义
volumes:
  clawai_data:
    driver: local
  clawai_logs:
    driver: local
  clawai_results:
    driver: local
  # redis_data:
  #   driver: local

# 网络定义
networks:
  clawai-network:
    driver: bridge