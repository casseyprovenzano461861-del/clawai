# ClawAI Nginx 站点配置 (Docker 版本)
# 用于 Dockerfile.frontend，挂载到 /etc/nginx/conf.d/default.conf
# 注意：此文件只含 server 块，全局配置由 /etc/nginx/nginx.conf 提供

# ==================== 速率限制 ====================
# API 限速：每 IP 每秒 10 个请求
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
# 登录端点严格限速：每 IP 每分钟 5 次
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
# 连接数限制
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ==================== HTTP 服务 ====================
# 容器内 HTTP（TLS 由外部 Load Balancer 或 Nginx 代理终止）
server {
    listen 80;
    server_name _;

    # 隐藏 Nginx 版本号
    server_tokens off;

    # 健康检查（不记录日志）
    location /health {
        return 200 "ok";
        add_header Content-Type text/plain;
        access_log off;
    }

    # ==================== 安全响应头 ====================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' wss: ws:; font-src 'self' data:;" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # 连接数限制
    limit_conn conn_limit 20;

    # ==================== 前端静态文件 ====================
    root /usr/share/nginx/html;
    index index.html;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss image/svg+xml;

    location / {
        try_files $uri $uri/ /index.html;

        # 静态资源长缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # HTML 文件不缓存
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ==================== API 反向代理 ====================
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://clawai-backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 登录/注册接口严格限速
    location ~ ^/api/v1/auth/(login|register) {
        limit_req zone=login_limit burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://clawai-backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket 代理
    location /ws/ {
        proxy_pass http://clawai-backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        return 404;
    }

    # 错误页面
    error_page 429 @rate_limit_error;
    error_page 500 502 503 504 /50x.html;

    location @rate_limit_error {
        default_type application/json;
        return 429 '{"error":"Too Many Requests","message":"Rate limit exceeded. Please slow down."}';
    }

    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
