# Prometheus 配置 - ClawAI 微服务监控

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'clawai'
    environment: '${ENVIRONMENT:-development}'

# 告警规则文件
rule_files:
  # - "alerts.yml"

# 抓取配置
scrape_configs:
  # Prometheus 自身
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # API 网关服务
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:8080']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  # AI 引擎服务
  - job_name: 'ai-engine'
    static_configs:
      - targets: ['ai-engine:8081']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  # 工具执行服务
  - job_name: 'tool-executor'
    static_configs:
      - targets: ['tool-executor:8082']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  # 数据服务
  - job_name: 'data-service'
    static_configs:
      - targets: ['data-service:8083']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  # Redis 服务
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 5s

  # Node Exporter (可选，监控主机资源)
  # - job_name: 'node-exporter'
  #   static_configs:
  #     - targets: ['node-exporter:9100']

# 告警管理配置
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093