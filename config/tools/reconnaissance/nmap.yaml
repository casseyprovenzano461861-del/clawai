# ClawAI Nmap 工具配置
# 适用于 Kali Linux 容器化执行

name: "nmap"
command: "nmap"
category: "reconnaissance"
description: |
  网络扫描工具，支持端口扫描、服务检测、脚本扫描。
  在 Kali Linux 容器中执行，具有 root 权限。

  **默认扫描模式**：
  - `-sT`: TCP 连接扫描
  - `-sV`: 版本检测
  - `-sC`: 默认 NSE 脚本

  **支持的功能**：
  - 端口范围扫描
  - 时序控制（T0-T5）
  - 自定义 NSE 脚本
  - OS 检测（需要 root，容器内可用）
  - 输出格式控制

enabled: true
requires_container: true
container_image: "kalilinux/kali-rolling:latest"
container_options:
  cap_add: ["NET_ADMIN", "SYS_PTRACE"]
  devices: ["/dev/net/tun"]
  network_mode: "host"  # 允许扫描外部网络

# 命令构建模板（支持参数替换）
command_template: "{command} {scan_type} {ports} {timing} {nse_scripts} {os_detection} {aggressive} {additional_args} {target}"

# 默认参数值
defaults:
  scan_type: "-sT -sV -sC"
  timing: "-T4"

# 参数定义
parameters:
  - name: "target"
    type: "string"
    description: "目标 IP、主机名、CIDR 或域名"
    required: true
    position: "last"  # 目标地址放在命令末尾
    validation:
      pattern: "^([a-zA-Z0-9.-]+|[0-9]{1,3}(\\.[0-9]{1,3}){3}(/[0-9]{1,2})?)$"
      error_message: "请输入有效的 IP 地址、主机名或 CIDR"

  - name: "ports"
    type: "string"
    description: "端口范围，如: 80, 1-1000, 80,443,8080"
    required: false
    flag: "-p"
    format: "flag"
    default: ""

  - name: "scan_type"
    type: "string"
    description: "扫描类型选项，如: -sS (SYN扫描), -sU (UDP扫描)"
    required: false
    format: "template"
    template: "{value}"
    default: "-sT -sV -sC"

  - name: "timing"
    type: "string"
    description: "时序模板 T0-T5，数字越大越快"
    required: false
    format: "template"
    template: "-T{value}"
    default: "4"
    validation:
      pattern: "^[0-5]$"
      error_message: "时序必须是 0-5 的数字"

  - name: "nse_scripts"
    type: "string"
    description: "NSE 脚本，如: vuln, http-title, http-headers"
    required: false
    flag: "--script"
    format: "flag"
    default: ""

  - name: "os_detection"
    type: "boolean"
    description: "启用 OS 检测 (-O)"
    required: false
    flag: "-O"
    format: "flag"
    default: false

  - name: "aggressive"
    type: "boolean"
    description: "启用激进扫描 (-A)"
    required: false
    flag: "-A"
    format: "flag"
    default: false

  - name: "additional_args"
    type: "string"
    description: "额外参数，如: -v, -Pn, --max-retries 3"
    required: false
    format: "positional"
    default: ""

# 输出处理配置
output_handling:
  # 结果解析器（可选）
  parser: "nmap_xml"  # 支持: nmap_xml, plain_text, json
  extract_fields:
    - name: "open_ports"
      path: "//port[@state='open']/@portid"
    - name: "services"
      path: "//service/@name"
    - name: "os_info"
      path: "//osmatch/@name"

  # 成功条件
  success_conditions:
    - exit_code: 0
    - output_contains: "Nmap done"

  # 错误检测
  error_patterns:
    - pattern: "QUITTING"
      message: "Nmap 因权限问题退出"
    - pattern: "Failed to resolve"
      message: "无法解析目标主机名"

# 性能和安全限制
limits:
  max_runtime: 600  # 最大运行时间（秒）
  max_output_size: 10485760  # 最大输出大小（10MB）
  allowed_networks: ["0.0.0.0/0"]  # 允许扫描的网络（生产环境应限制）
  require_authentication: true  # 是否需要认证

# 监控指标
metrics:
  - name: "scan_duration"
    type: "histogram"
    description: "扫描持续时间"
  - name: "ports_scanned"
    type: "counter"
    description: "扫描的端口数量"
  - name: "open_ports_found"
    type: "gauge"
    description: "发现的开放端口数量"

# 技能系统集成
skill_integration:
  skill_name: "nmap_scan"
  skill_class: "NmapScanSkill"
  required_capabilities: ["network_scanning", "port_detection"]
  provides_context: ["open_ports", "service_versions", "os_info"]