name: "testssl"
description: "testssl.sh是一个用于测试SSL/TLS配置安全性的工具，能够检测SSL/TLS证书和配置的安全问题。"
category: "scanning"
required: false
version: "0.1"

# 执行命令配置
execution:
  # 可执行文件路径
  executable: "bash"
  # 基础参数
  base_args: ["tools/penetration/testssl.sh/testssl.sh"]
  # 超时设置（秒）
  timeout: 300

# 工具参数配置
parameters:
  # 目标主机和端口
  target:
    type: "string"
    required: true
    description: "目标主机和端口，例如 example.com:443"
    position: "positional"
  # 详细模式
  verbose:
    type: "boolean"
    required: false
    description: "启用详细输出"
    flag: "-v"
  # 无颜色输出
  no-color:
    type: "boolean"
    required: false
    description: "禁用颜色输出"
    flag: "--no-colors"
  # 输出格式
  format:
    type: "string"
    required: false
    description: "输出格式 (html, json, csv, nmap, grep, txt)"
    flag: "--format"
  # 输出文件
  output:
    type: "string"
    required: false
    description: "输出文件路径"
    flag: "--logfile"
  # 代理设置
  proxy:
    type: "string"
    required: false
    description: "使用代理服务器"
    flag: "--proxy"
  # 快速模式
  fast:
    type: "boolean"
    required: false
    description: "快速模式，只测试常见问题"
    flag: "--fast"

# 结果解析配置
result_parsing:
  # 结果格式
  format: "text"
  # 漏洞模式
  vulnerability_patterns:
    - pattern: '[VULNERABLE]'
      severity: "high"
    - pattern: '[WARNING]'
      severity: "medium"
    - pattern: '[INFO]'
      severity: "low"
  # 成功标志
  success_pattern: "Done"
  # 错误标志
  error_patterns:
    - "Error"
    - "Failed"
    - "Connection refused"

# 工具依赖
requirements:
  - "bash"
  - "openssl"

# 工具元数据
metadata:
  author: "Dr. Dirk Wetter"
  homepage: "https://github.com/drwetter/testssl.sh"
  license: "GPL-2.0"
  description: "testssl.sh是一个用于测试SSL/TLS配置安全性的工具，能够检测SSL/TLS证书和配置的安全问题。"
  tags:
    - "ssl"
    - "tls"
    - "scanning"
    - "security"
    - "penetration-testing"