name: "hashcat"
description: "Hashcat是一个强大的密码哈希破解工具，支持多种哈希算法和破解模式。"
category: "password-cracking"
required: false
version: "0.1"

# 执行命令配置
execution:
  # 可执行文件路径
  executable: "tools/penetration/hashcat-master/hashcat"
  # 基础参数
  base_args: []
  # 超时设置（秒）
  timeout: 300

# 工具参数配置
parameters:
  # 哈希类型
  hash-type:
    type: "integer"
    required: true
    description: "哈希类型，例如 0 表示 MD5"
    flag: "-m"
  # 哈希文件
  hash-file:
    type: "string"
    required: true
    description: "包含哈希值的文件路径"
    flag: "-a"
  # 攻击模式
  attack-mode:
    type: "integer"
    required: true
    description: "攻击模式，例如 0 表示字典攻击"
    flag: "-a"
  # 字典文件
  wordlist:
    type: "string"
    required: false
    description: "字典文件路径"
    flag: "-a"
  # 规则文件
  rule-file:
    type: "string"
    required: false
    description: "规则文件路径"
    flag: "-r"
  # 详细模式
  verbose:
    type: "boolean"
    required: false
    description: "启用详细输出"
    flag: "-v"
  # 无交互模式
  silent:
    type: "boolean"
    required: false
    description: "无交互模式"
    flag: "-q"

# 结果解析配置
result_parsing:
  # 结果格式
  format: "text"
  # 成功标志
  success_pattern: "Cracked"
  # 错误标志
  error_patterns:
    - "Error"
    - "Failed"
    - "Connection refused"

# 工具依赖
requirements:
  - "cuda"
  - "opencl"

# 工具元数据
metadata:
  author: "Jens Steube"
  homepage: "https://github.com/hashcat/hashcat"
  license: "MIT"
  description: "Hashcat是一个强大的密码哈希破解工具，支持多种哈希算法和破解模式。"
  tags:
    - "password-cracking"
    - "hash"
    - "security"
    - "penetration-testing"
    - "hacking"