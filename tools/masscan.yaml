name: "masscan"
command: "masscan"
enabled: true
short_description: "高速网络扫描工具"
description: |
  Masscan是一个高速网络扫描工具，用于大规模端口扫描。
  它可以在短时间内扫描大量IP地址和端口。

  **主要功能：**
  - 高速端口扫描
  - 支持大规模网络扫描
  - 可自定义扫描速率
  - 支持多种输出格式

  **使用场景：**
  - 大规模网络资产发现
  - 快速端口扫描
  - 网络安全评估
  - 漏洞扫描前的信息收集
parameters:
  - name: "target"
    type: "string"
    description: |
      目标IP或网段，支持CIDR表示法。
      示例：192.168.1.0/24 或 10.0.0.1
    required: true
    format: "flag"
    flag: "--range"
  - name: "ports"
    type: "string"
    description: |
      端口范围，支持单个端口、范围或逗号分隔的列表。
      示例：80,443 或 1-65535
    required: true
    format: "flag"
    flag: "--ports"
  - name: "rate"
    type: "string"
    description: |
      扫描速率，单位为数据包/秒。
      示例：10000
    required: false
    format: "flag"
    flag: "--rate"
  - name: "output"
    type: "string"
    description: "输出文件"
    required: false
    format: "flag"
    flag: "--output"
  - name: "output-format"
    type: "string"
    description: |
      输出格式，支持json、xml、list等。
      示例：json
    required: false
    format: "flag"
    flag: "--output-format"
  - name: "additional_args"
    type: "string"
    description: "额外的Masscan参数"
    required: false
    format: "positional"
