name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==================== 后端 Lint ====================
  lint:
    name: Backend Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check .

      - name: Type check with mypy
        run: mypy src --ignore-missing-imports || true
        # mypy 类型检查失败不阻断 CI（渐进式采用）

  # ==================== 后端测试 ====================
  test:
    name: Backend Tests
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: testing
      JWT_SECRET_KEY: ci-test-jwt-secret
      SECRET_KEY: ci-test-secret-key
      DATABASE_URL: sqlite:///./test_clawai.db
      ALLOWED_ORIGINS: http://localhost:3000
      RATE_LIMIT_ENABLED: "false"
      API_AUTH_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: pytest --cov=src --cov-report=term-missing --cov-report=xml --cov-fail-under=20 -m "not slow and not perf" -v

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ==================== 前端构建检查 ====================
  frontend-build:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_BASE: http://localhost:8000/api/v1
          VITE_USE_MOCK_DATA: "false"

  # ==================== Docker 镜像构建 & 安全扫描 ====================
  container-scan:
    name: Docker Build & Trivy Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: clawai:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: clawai:scan
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  # ==================== 配置安全检查 ====================
  config-check:
    name: Config Security Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check no hardcoded secrets in source
        run: |
          echo "Checking for hardcoded secrets..."
          # 检查是否有明显的硬编码密钥（排除示例文件和测试）
          if grep -r "JWT_SECRET_KEY=.*[a-zA-Z0-9]\{20\}" --include="*.py" src/ 2>/dev/null | grep -v "test\|example\|sample\|change.*prod"; then
            echo "WARNING: Possible hardcoded JWT secret found"
            exit 1
          fi
          echo "No hardcoded secrets detected in Python source."

      - name: Verify .env files not tracked
        run: |
          if git ls-files | grep -E "^\.env$|^\.env\.production$|^\.env\.staging$"; then
            echo "ERROR: .env file(s) are tracked by git! Remove them immediately."
            exit 1
          fi
          echo ".env files are properly gitignored."

      - name: Check CORS wildcard not in source
        run: |
          if grep -r 'allow_origins=\["\*"\]' --include="*.py" src/ 2>/dev/null; then
            echo "ERROR: CORS wildcard (*) found in source code!"
            exit 1
          fi
          echo "No CORS wildcard in source code."

  # ==================== Python 包构建验证 ====================
  build-check:
    name: Package Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build dependencies
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Verify package
        run: |
          pip install dist/*.whl
          clawai --help || true
